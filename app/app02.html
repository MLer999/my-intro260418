<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロンプト推測クイズ - Machiroy's App</title>
    <style>
        /* 2000年代風のレトロデザイン（index.htmlと統一） */
        body {
            background-color: #E0FFFF;
            color: #000080;
            font-family: "MS Pゴシック", "MS PGothic", sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .container {
            width: 800px;
            margin: 20px auto;
            border: 3px ridge #000080;
            background-color: #FFFFFF;
            padding: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            background-color: #FF69B4; /* こちらはピンクベース */
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .quiz-image-box {
            text-align: center;
            margin: 20px 0;
            border: 3px solid #000080;
            padding: 10px;
            background-color: #F0F8FF;
        }

        .quiz-image-box img {
            max-width: 50%;
            border: 1px solid #ccc;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            border-bottom: 2px dashed #000080;
            padding-bottom: 10px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #E0FFFF;
            border: 2px outset #000080; /* 立体的なボタン */
            color: #000080;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            font-family: "MS Pゴシック", "MS PGothic", sans-serif;
        }

        .option-btn:hover {
            background-color: #FFB6C1; /* マウスを乗せたらピンクに */
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 3px double #FF0000;
            background-color: #FFFFE0;
        }

        .result-title {
            font-size: 20px;
            font-weight: bold;
            color: #FF0000;
            text-align: center;
            margin-bottom: 10px;
        }

        .commentary {
            font-size: 16px;
            line-height: 1.5;
        }

        .next-btn {
            display: block;
            margin: 20px auto 0;
            background-color: #000080;
            color: white;
            border: 2px outset #ccc;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #000080;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 プロンプト推測クイズ 🧠</h1>
        <p style="text-align: center; font-weight: bold;">Machiroy's Challenge! この画像を生み出した「呪文」はどれだ！？</p>
        
        <div id="quiz-area">
            <div class="quiz-image-box">
                <img id="quiz-image" src="./quiz1.png" alt="Quiz Image">
            </div>

            <div class="question-text" id="question-text">
                第1問：このサイバーパンク風のドット絵を作るために使用したプロンプトはどれでしょう？
            </div>

            <div class="options-container" id="options-container">
                <!-- 選択肢がJavaScriptによってここに追加されます -->
            </div>
        </div>

        <div class="result-box" id="result-box">
            <div class="result-title" id="result-title">正解！！</div>
            <div class="commentary" id="result-commentary">ここに解説が入ります。</div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ！</button>
        </div>

        <a href="../index.html" class="back-link">← Machiroy's Room トップへ戻る</a>
    </div>

    <script>
        // クイズのデータ（全5問・選択肢は日本語表記）
        const quizData = [
            {
                image: "./quiz1.png",
                question: "第1問：このエモいサイバーパンク風の街並みを作るために使用したプロンプトはどれでしょう？",
                options: [
                    { text: "A. ミニマリストなネオン部屋にいる未来的なロボット犬", isCorrect: false },
                    { text: "B. ピクセルアートスタイルのサイバーパンク都市、2000年代レトロアニメ風", isCorrect: true },
                    { text: "C. 空飛ぶ車と高い摩天楼がある夜の超リアルな都市風景", isCorrect: false }
                ],
                commentary: "正解はB！\n「ピクセルアートスタイル」と「2000年代レトロアニメ風」という強力なキーワードを入れることで、当時のゲームやアニメのようなエモい雰囲気を再現しています。（英語プロンプト：A cyberpunk city in pixel art style, retro 2000s anime aesthetic.）"
            },
            {
                image: "./quiz2.png",
                question: "第2問：この未来的なメカ犬を作るために使用したプロンプトはどれでしょう？",
                options: [
                    { text: "A. 未来的な公園で遊んでいるフワフワで可愛い子犬", isCorrect: false },
                    { text: "B. 水彩画で描かれたスチームパンク風の機械仕掛けの猫", isCorrect: false },
                    { text: "C. ミニマリストなネオン部屋にいる未来的なロボット犬", isCorrect: true }
                ],
                commentary: "正解はC！\n「ミニマリストなネオン部屋」を指定することで、背景がごちゃごちゃせず、主役のロボット犬が際立つ洗練された構図になります。（英語プロンプト：A futuristic robotic dog in a minimalist neon room.）"
            },
            {
                image: "./quiz3.png",
                question: "第3問：この温かみのあるカフェを作るために使用したプロンプトはどれでしょう？",
                options: [
                    { text: "A. 植物と暖かい照明がある居心地の良いコーヒーショップの内装、スタジオジブリのアニメ風", isCorrect: true },
                    { text: "B. 現代的で無機質なコンクリート打ちっぱなしのカフェ、写真のような質感", isCorrect: false },
                    { text: "C. 宇宙ステーションの中にあるサイバーパンク風の喫茶店、ネオンライト", isCorrect: false }
                ],
                commentary: "正解はA！\n「スタジオジブリのアニメ風 (studio ghibli anime style)」と入れると、AIはあの特有の温かい色彩と手書きのような優しいタッチを再現してくれます。（英語プロンプト：A cozy coffee shop interior with plants and warm lighting, studio ghibli anime style.）"
            },
            {
                image: "./quiz4.png",
                question: "第4問：この本物のような甲虫を作るために使用したプロンプトはどれでしょう？",
                options: [
                    { text: "A. 色鉛筆で細密に描かれた青い目を持つクワガタの絵", isCorrect: false },
                    { text: "B. 光る青い目を持つ金属的なカブトムシの超リアルなマクロ撮影、8K解像度", isCorrect: true },
                    { text: "C. デジタルアートで描かれたファンタジー世界の巨大な光る虫", isCorrect: false }
                ],
                commentary: "正解はB！\n「超リアルなマクロ撮影 (hyper-realistic macro shot)」「8K解像度 (8k resolution)」という呪文を入れることで、AIが写真のような圧倒的な質感と精密さを描き出します。（英語プロンプト：A hyper-realistic macro shot of a metallic beetle with glowing blue eyes, 8k resolution.）"
            },
            {
                image: "./quiz5.png",
                question: "第5問：この幻想的な宇宙飛行士を作るために使用したプロンプトはどれでしょう？",
                options: [
                    { text: "A. カラフルな星雲の中を漂う宇宙飛行士、デジタルペインティング、ファンタジーアート", isCorrect: true },
                    { text: "B. 月面に着陸するアポロ計画の宇宙飛行士、白黒の歴史的写真", isCorrect: false },
                    { text: "C. レトロなSF映画のポスターに描かれた宇宙飛行士、アメコミ風", isCorrect: false }
                ],
                commentary: "正解はA！\n「デジタルペインティング (digital painting)」「ファンタジーアート (fantasy art)」を指定すると、現実の写真ではなく、アーティストが描いたような美しく幻想的なイラストになります。（英語プロンプト：An astronaut floating in a colorful nebula, digital painting, fantasy art.）"
            }
        ];

        let currentQuestionIndex = 0;

        // クイズを描画する関数
        function loadQuestion() {
            const currentQuiz = quizData[currentQuestionIndex];
            
            // 画像と問題文をセット
            document.getElementById("quiz-image").src = currentQuiz.image;
            document.getElementById("question-text").innerText = currentQuiz.question;
            
            // 選択肢エリアをクリア
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            // 結果エリアを隠す
            document.getElementById("result-box").style.display = "none";
            document.getElementById("options-container").style.display = "flex";

            // 選択肢ボタンを生成
            currentQuiz.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = option.text;
                
                // クリック時の判定処理
                btn.onclick = () => checkAnswer(option.isCorrect, currentQuiz.commentary);
                
                optionsContainer.appendChild(btn);
            });
        }

        // 答え合わせをする関数
        function checkAnswer(isCorrect, commentary) {
            const resultBox = document.getElementById("result-box");
            const resultTitle = document.getElementById("result-title");
            const resultCommentary = document.getElementById("result-commentary");
            const nextBtn = document.getElementById("next-btn");

            // 選択肢を隠して結果を表示
            document.getElementById("options-container").style.display = "none";
            resultBox.style.display = "block";

            if (isCorrect) {
                resultTitle.innerText = "✨🎉 大正解！！ 🎉✨";
                resultTitle.style.color = "#FF00FF"; // マゼンタ
            } else {
                resultTitle.innerText = "❌ ザンネン！不正解... ❌";
                resultTitle.style.color = "blue";
            }

            resultCommentary.innerText = commentary;

            // 最後の問題かどうかでボタンの文字を変える
            if (currentQuestionIndex >= quizData.length - 1) {
                nextBtn.innerText = "トップページに戻る";
                nextBtn.onclick = () => window.location.href = "../index.html";
            } else {
                nextBtn.innerText = "次の問題へ！";
            }
        }

        // 次の問題に進む関数
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            }
        }

        // 最初に1問目を読み込む
        window.onload = loadQuestion;
    </script>
</body>
</html>
